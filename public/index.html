const SB_HEADERS={"apikey":SUPABASE_KEY,"Authorization":"Bearer "+SUPABASE_KEY,"Content-Type":"application/json"};

const DB={
  async load(key){
    try{
      const r=await fetch(`${SUPABASE_URL}/rest/v1/app_data?key=eq.${key}&select=value`,{headers:SB_HEADERS});
      const d=await r.json();
      return d?.[0]?.value||[];
    }catch(e){console.error("DB load error:",key,e);return[];}
  },
  async save(key,value){
    try{
      await fetch(`${SUPABASE_URL}/rest/v1/app_data`,{
        method:"POST",
        headers:{...SB_HEADERS,"Prefer":"resolution=merge-duplicates"},
        body:JSON.stringify({key,value,updated_at:new Date().toISOString()})
      });
    }catch(e){console.error("DB save error:",key,e);}
  },
  async loadAll(){
    try{
      const r=await fetch(`${SUPABASE_URL}/rest/v1/app_data?select=key,value`,{headers:SB_HEADERS});
      const d=await r.json();
      const m={};d.forEach(x=>m[x.key]=x.value);return m;
    }catch(e){console.error("DB loadAll error:",e);return{};}
  }
};

// Debounce helper
const debounceTimers={};
function dbSave(key,value){
  clearTimeout(debounceTimers[key]);
  debounceTimers[key]=setTimeout(()=>DB.save(key,value),800);
}

// ═══ LOGIN ══════════════════════════════════════════════════════
function Login({users:us,onLogin:ol}){

  const[e,sE]=useState("");
  const[p,sP]=useState("");
  const[er,sEr]=useState("");

  const go=()=>{
    const el=e.toLowerCase().trim();
    const u=us.find(u=>(u.email.toLowerCase()===el||u.name.toLowerCase()===el||(u.gmail&&u.gmail.toLowerCase()===el))&&u.pass===p);
    u?ol(u):sEr("Credenciales incorrectas");
  };

  const loginGoogle=()=>{
    window.location.href="/api/auth/google-login";
  };

  return(
    <div style={{height:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"var(--bg)"}}>
      <div className="su" style={{width:420,padding:34,background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:20}}>

        <h1 style={{textAlign:"center",marginBottom:20}}>INMERSIA</h1>

        {er && <div style={{color:"red",marginBottom:10}}>{er}</div>}

        <input
          type="text"
          value={e}
          onChange={x=>{sE(x.target.value);sEr("")}}
          placeholder="Email o usuario"
        />

        <input
          type="password"
          value={p}
          onChange={x=>{sP(x.target.value);sEr("")}}
          placeholder="Contraseña"
        />

        <button onClick={go} style={{width:"100%",marginTop:10,padding:10}}>
          Iniciar sesión
        </button>

        <button onClick={loginGoogle} style={{width:"100%",marginTop:10,padding:10,background:"#4285F4",color:"#fff"}}>
          Iniciar con Google
        </button>

      </div>
    </div>
  );
}

function AutoTx({value,onChange,placeholder,style,...props}){
  const ref=useRef(null);
  useEffect(()=>{if(ref.current){ref.current.style.height="auto";ref.current.style.height=ref.current.scrollHeight+"px";}},[value]);
  return(<textarea ref={ref} value={value||""} onChange={onChange} placeholder={placeholder} {...props} style={{...style,overflow:"hidden",resize:"none",minHeight:32,transition:"height .1s ease"}}/>);
}

// ═══ WEEK PLANNER ══════════════════════════════════════════════
function WeekPlanner({tasks,sT,cos,users,planners,sPlanners,pDrafts,sPDrafts,fCo,addN}){
  const[wkOff,sWkOff]=useState(0);const[dragItem,sDragItem]=useState(null);const[dragOver,sDragOver]=useState(null);
  const[selCo,sSelCo]=useState(fCo!=="all"?fCo:cos[0]?.id||0);
  const co=cos.find(c=>String(c.id)===String(selCo));

  const weekDays=useMemo(()=>{
    const now=new Date();now.setDate(now.getDate()+wkOff*7);const dow=now.getDay();const mon=dow===0?6:dow-1;
    const start=new Date(now);start.setDate(start.getDate()-mon);const today=new Date();const days=[];
    for(let i=0;i<7;i++){const d=new Date(start);d.setDate(start.getDate()+i);days.push({date:d,ds:d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"),day:d.getDate(),month:MO[d.getMonth()],dayName:["Lunes","Martes","Miércoles","Jueves","Viernes","Sábado","Domingo"][i],dayShort:["LUN","MAR","MIÉ","JUE","VIE","SÁB","DOM"][i],isToday:d.toDateString()===today.toDateString()});}
    return days;
  },[wkOff]);

  const weekKey=weekDays[0]?.ds+"_"+String(selCo);
  const plan=planners.find(p=>p.weekKey===weekKey)||{weekKey,companyId:selCo,items:[]};
  const items=plan.items||[];
  const dayItems=day=>items.filter(it=>it.day===day).sort((a,b)=>(a.order||0)-(b.order||0));

  const updatePlan=(newItems)=>{
    const np={...plan,items:newItems,weekKey,companyId:selCo,companyName:co?.name||""};
    sPlanners(prev=>{const idx=prev.findIndex(p=>p.weekKey===weekKey);if(idx>=0){const u=[...prev];u[idx]=np;return u;}return[...prev,np];});
  };

  const addItem=(day)=>{const ni2={id:Date.now(),day,type:"post",title:"",description:"",strategy:"",production:[],state:"borrador",order:dayItems(day).length};updatePlan([...items,ni2]);};
  const updateItem=(id,u)=>updatePlan(items.map(it=>it.id===id?{...it,...u}:it));
  const removeItem=(id)=>updatePlan(items.filter(it=>it.id!==id));
  const moveItem=(itemId,toDay)=>{updatePlan(items.map(it=>it.id===itemId?{...it,day:toDay,order:dayItems(toDay).length}:it));sDragItem(null);sDragOver(null);};

  // Save planner AND sync to calendar
  const savePlan=()=>{

    const all=planners.some(p=>p.weekKey===weekKey)?planners.map(p=>p.weekKey===weekKey?{...plan,items}:p):[...planners,{...plan,items}];
    DB.save("planners",all);sPlanners(all);

    // Sync items to calendar tasks
    const plannerTag="planner_"+weekKey;
    sT(prev=>{
      // Remove old planner-generated tasks for this week+company
      const cleaned=prev.filter(t=>t.plannerTag!==plannerTag);
      // Create new tasks from planner items
      const newTasks=items.filter(it=>it.title||it.description).map(it=>({
        id:Date.now()+Math.random()*10000|0,
        title:it.title||(TT[it.type]?.l||"Contenido")+" "+co?.name,
        company:co?.name||"",
        companyId:parseInt(selCo)||0,
        type:it.type,
        description:it.description+(it.strategy?"\n\n📌 Estrategia: "+it.strategy:""),
        responsable:it.production||[],
        date:it.day,
        state:it.state==="publicado"?"publicado":it.state==="aprobado"?"aprobado":"no_realizado",
        comments:[],votes:{},clientApproval:null,files:[],
        plannerTag
      }));
      const result=[...cleaned,...newTasks];
      DB.save("tasks",result);
      return result;
    });

    addN("✅ Plan guardado y sincronizado al calendario");
  };

  const dupWeek=()=>{const nextOff=wkOff+1;const now2=new Date();now2.setDate(now2.getDate()+nextOff*7);const dow2=now2.getDay();const mon2=dow2===0?6:dow2-1;
    const start2=new Date(now2);start2.setDate(start2.getDate()-mon2);const nDays=[];
    for(let i=0;i<7;i++){const d2=new Date(start2);d2.setDate(start2.getDate()+i);nDays.push(d2.getFullYear()+"-"+String(d2.getMonth()+1).padStart(2,"0")+"-"+String(d2.getDate()).padStart(2,"0"));}
    const newKey=nDays[0]+"_"+String(selCo);
    const dayMap={};weekDays.forEach((wd,i)=>{dayMap[wd.ds]=nDays[i];});
    const dupItems=items.map(it=>({...it,id:Date.now()+Math.random()*1000|0,day:dayMap[it.day]||it.day,state:"borrador"}));
    const np={weekKey:newKey,companyId:selCo,companyName:co?.name||"",items:dupItems};
    const newAll=[...planners,np];
    sPlanners(newAll);DB.save("planners",newAll);
    sWkOff(nextOff);addN("📋 Semana duplicada");};

  const STATES={borrador:{l:"Borrador",c:"#888"},aprobado:{l:"Aprobado",c:"#4ecdc4"},publicado:{l:"Publicado",c:"#9d6bff"}};

  return(<div className="fi">
    {/* HEADER */}
    <div style={{background:"linear-gradient(135deg,var(--bg2),var(--bg3))",border:"1px solid var(--border)",borderRadius:12,padding:"16px 20px",marginBottom:16}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:10}}>
        <div>
          <div style={{fontSize:22,fontWeight:900,color:co?.color||"var(--accent)",letterSpacing:1}}>{co?.name?.toUpperCase()||"EMPRESA"}</div>
          <div style={{fontSize:11,color:"var(--tx2)",marginTop:2}}>INMERSIA SPA · MARKETING DIGITAL 2026</div>
        </div>

            sPDrafts(newDrafts);DB.save("planner_drafts",newDrafts);

          <Bt v="d" onClick={()=>{

        </div>
      </div>
      {/* DIFF VIEW */}
      {(draft.proposed||[]).map(prop=>{const orig=(draft.original||[]).find(o=>o.id===prop.id);if(!orig)return null;
        const descChanged=orig.description!==prop.description;const stratChanged=orig.strategy!==prop.strategy;
        if(!descChanged&&!stratChanged)return null;
        return(<div key={prop.id} style={{background:"var(--bg2)",borderRadius:8,padding:10,marginBottom:6,borderLeft:"3px solid var(--gold)"}}>
          <div style={{fontSize:11,fontWeight:700,marginBottom:4}}>{TT[prop.type]?.i} {prop.title} <span style={{color:"var(--tx3)",fontSize:9}}>({weekDays.find(w=>w.ds===prop.day)?.dayName})</span></div>
          {descChanged&&(<div style={{marginBottom:6}}>
            <div style={{fontSize:9,color:"var(--tx3)",marginBottom:2}}>DESCRIPCIÓN:</div>
            <div style={{fontSize:10,padding:6,background:"rgba(255,68,68,.06)",borderRadius:4,borderLeft:"3px solid rgba(255,68,68,.4)",color:"var(--danger)",textDecoration:"line-through",marginBottom:3}}>{orig.description}</div>
            <div style={{fontSize:10,padding:6,background:"rgba(78,205,196,.06)",borderRadius:4,borderLeft:"3px solid rgba(78,205,196,.4)",color:"var(--success)"}}>{prop.description}</div>

            <div style={{fontSize:10,padding:6,background:"rgba(255,68,68,.06)",borderRadius:4,borderLeft:"3px solid rgba(255,68,68,.4)",color:"var(--danger)",textDecoration:"line-through",marginBottom:3}}>{orig.strategy}</div>
            <div style={{fontSize:10,padding:6,background:"rgba(78,205,196,.06)",borderRadius:4,borderLeft:"3px solid rgba(78,205,196,.4)",color:"var(--success)"}}>{prop.strategy}</div>
          </div>)}
        </div>);
      })}
    </div>))}

    {/* VERTICAL DAY LIST */}
    {weekDays.map(wd=>{const di=dayItems(wd.ds);
      return(<div key={wd.ds}
        onDragOver={e=>{e.preventDefault();sDragOver(wd.ds);}}
        onDragLeave={()=>sDragOver(null)}
        onDrop={()=>{if(dragItem)moveItem(dragItem,wd.ds);}}
        style={{marginBottom:8,background:dragOver===wd.ds?"rgba(168,226,107,.06)":"transparent",borderRadius:12,transition:"background .2s"}}>

        {/* DAY HEADER */}
        <div style={{display:"flex",alignItems:"center",gap:10,padding:"8px 4px",borderBottom:"2px solid "+(wd.isToday?"var(--accent)":co?.color||"var(--border)")}}>
          <div style={{width:50,textAlign:"center"}}>
            <div style={{fontSize:10,fontWeight:700,color:wd.isToday?"var(--accent)":"var(--tx2)",letterSpacing:1}}>{wd.dayShort}</div>
            <div style={{fontSize:22,fontWeight:900,color:wd.isToday?"var(--accent)":"var(--tx)",fontFamily:"var(--font-mono)"}}>{wd.day}</div>
          </div>
          <div style={{flex:1}}>
            <div style={{fontSize:13,fontWeight:700,color:wd.isToday?"var(--accent)":"var(--tx)"}}>{wd.dayName}</div>

          </div>
          <div style={{fontSize:10,color:"var(--tx3)"}}>{di.length} contenido{di.length!==1?"s":""}</div>
        </div>

        {di.length===0&&!dragOver?(<div style={{padding:"12px 16px",color:"var(--tx3)",fontSize:11,fontStyle:"italic"}}>Sin contenido planificado</div>):null}

        {di.map(it=>(<div key={it.id} draggable onDragStart={()=>sDragItem(it.id)} onDragEnd={()=>{sDragItem(null);sDragOver(null);}}
          style={{margin:"6px 0",background:"var(--bg2)",border:"1px solid var(--border)",borderLeft:"4px solid "+(TT[it.type]?.c||"#999"),borderRadius:8}}>

          <div style={{display:"flex",flexWrap:"wrap",alignItems:"flex-start"}}>

            {/* FORMATO */}
            <div style={{width:140,padding:12,borderRight:"1px solid var(--border)",flexShrink:0}}>
              <div style={{fontSize:9,color:"var(--tx3)",fontWeight:600,letterSpacing:1,marginBottom:4}}>FORMATO</div>
              <select value={it.type} onChange={e=>updateItem(it.id,{type:e.target.value})} style={{fontSize:12,padding:"5px 6px",fontWeight:600,width:"100%"}}>
                {Object.entries(TT).map(([k,v])=><option key={k} value={k}>{v.i} {v.l}</option>)}
              </select>
              <select value={it.state} onChange={e=>updateItem(it.id,{state:e.target.value})} style={{fontSize:10,padding:"3px 6px",width:"100%",marginTop:6}}>
                {Object.entries(STATES).map(([k,v])=><option key={k} value={k}>{v.l}</option>)}
              </select>
            </div>

            {/* DESCRIPCIÓN */}
            <div style={{flex:2,minWidth:200,padding:12,borderRight:"1px solid var(--border)"}}>
              <div style={{fontSize:9,color:"var(--tx3)",fontWeight:600,letterSpacing:1,marginBottom:4}}>DESCRIPCIÓN DEL CONTENIDO</div>
              <input value={it.title} onChange={e=>updateItem(it.id,{title:e.target.value})} placeholder="Título del contenido..." style={{fontSize:14,fontWeight:700,padding:"6px 8px",marginBottom:6,width:"100%",boxSizing:"border-box"}}/>
              <AutoTx value={it.description} onChange={e=>updateItem(it.id,{description:e.target.value})} placeholder="Describe el contenido: qué se muestra, estilo, tono, elementos visuales..." style={{fontSize:12,padding:"8px",width:"100%",boxSizing:"border-box",lineHeight:1.6}}/>
            </div>

            <div style={{flex:1,minWidth:180,padding:12,borderRight:"1px solid var(--border)"}}>

            </div>

            {/* PRODUCCIÓN */}
            <div style={{width:150,padding:12,flexShrink:0}}>
              <div style={{fontSize:9,color:"var(--tx3)",fontWeight:600,letterSpacing:1,marginBottom:4}}>PRODUCCIÓN</div>

                style={{display:"flex",alignItems:"center",gap:5,padding:"4px 8px",borderRadius:6,fontSize:11,fontWeight:sel?700:400,background:sel?u.color+"20":"transparent",border:"1px solid "+(sel?u.color+"55":"var(--border)"),color:sel?u.color:"var(--tx3)",cursor:"pointer",fontFamily:"inherit",width:"100%",textAlign:"left",marginBottom:2}}>
                <Av u={u} sz={16}/>{u.name}
              </button>);})}
              <button onClick={()=>removeItem(it.id)} style={{marginTop:8,fontSize:9,color:"var(--danger)",background:"transparent",border:"1px solid rgba(255,68,68,.2)",borderRadius:4,padding:"4px 6px",cursor:"pointer",fontFamily:"inherit",width:"100%"}}>✕ Eliminar</button>
            </div>
          </div>
        </div>))}

        <button onClick={()=>addItem(wd.ds)} style={{margin:"4px 0 8px",padding:"10px 16px",background:"transparent",border:"1px dashed var(--border)",borderRadius:8,color:"var(--tx3)",fontSize:12,cursor:"pointer",fontFamily:"inherit",width:"100%",textAlign:"left"}}>+ Agregar contenido para {wd.dayName.toLowerCase()}</button>
      </div>);
    })}

    {/* STRATEGY SUMMARY */}
    {items.length>0&&(<div style={{background:"linear-gradient(135deg,var(--bg2),var(--bg3))",border:"1px solid var(--border)",borderRadius:12,padding:16,marginTop:8}}>
      <div style={{fontSize:14,fontWeight:800,marginBottom:12}}>📊 ESTRATEGIA SEMANAL — {co?.name?.toUpperCase()}</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(250px,1fr))",gap:10}}>
        {weekDays.filter(wd=>dayItems(wd.ds).length>0).map(wd=>(<div key={wd.ds} style={{background:"var(--bg3)",borderRadius:8,padding:10,borderLeft:"3px solid "+(co?.color||"var(--accent)")}}>
          <div style={{fontSize:11,fontWeight:700,color:co?.color||"var(--accent)",marginBottom:6}}>{wd.dayShort} {wd.day} {wd.month?.toUpperCase()}</div>
          {dayItems(wd.ds).map(it=>(<div key={it.id} style={{marginBottom:6}}>
            <div style={{fontSize:11,fontWeight:700,color:TT[it.type]?.c}}>{TT[it.type]?.i} {TT[it.type]?.l?.toUpperCase()}</div>
            {it.strategy&&<div style={{fontSize:11,color:"var(--tx2)",lineHeight:1.4,marginTop:2}}>{it.strategy}</div>}
            {(it.production||[]).length>0&&<div style={{fontSize:9,color:"var(--tx3)",marginTop:2}}>{(it.production||[]).map(uid=>users.find(u=>u.id===uid)?.name).filter(Boolean).join(" · ")}</div>}
          </div>))}
        </div>))}
      </div>
    </div>)}

    <div style={{textAlign:"center",padding:"12px 0",fontSize:9,color:"var(--tx3)",marginTop:8}}>
      Contenido planificado por {co?.name} · Inmersia SPA · Marketing Digital · {weekDays[0]?.date?.getFullYear()}
    </div>
  </div>);
}

    <Fd label="Responsables"><div style={{display:"flex",flexWrap:"wrap",gap:4}}>{teamUsers.map(u=>{const sel=Array.isArray(t.responsable)?t.responsable.includes(u.id):t.responsable===u.id;return(<button key={u.id} onClick={()=>{const cur=Array.isArray(t.responsable)?[...t.responsable]:(t.responsable?[t.responsable]:[]);const nw=sel?cur.filter(id=>id!==u.id):[...cur,u.id];onUp({responsable:nw});}} style={{display:"flex",alignItems:"center",gap:4,padding:"4px 8px",borderRadius:6,fontSize:9,fontWeight:sel?700:400,background:sel?u.color+"25":"var(--bg4)",border:"1px solid "+(sel?u.color:"var(--border)"),color:sel?u.color:"var(--tx2)",cursor:"pointer",fontFamily:"inherit"}}><Av u={u} sz={14}/>{u.name}</button>);})}</div></Fd>
    <Fd label="Fecha"><input type="date" value={t.date||""} onChange={e=>onUp({date:e.target.value||null})}/></Fd>
    {t.state==="publicado"&&(<Fd label="Hora de publicación"><input type="time" value={t.publishTime||""} onChange={e=>onUp({publishTime:e.target.value||null})} style={{fontSize:12}}/></Fd>)}
    <Fd label="Descripcion"><textarea value={desc} onChange={e=>sD(e.target.value)} onBlur={()=>onUp({description:desc})} rows={2} placeholder="..."/></Fd>
    {(t.state==="en_aprobacion"||t.state==="en_proceso")&&(<div style={{background:"var(--bg3)",borderRadius:8,padding:8}}>
      <div style={{fontSize:10,fontWeight:600,marginBottom:4}}>📎 Archivos ({t.files?.length||0})</div>
      {t.files?.map((f,i)=>(<div key={i} style={{marginBottom:3}}>{f.type?.startsWith("image")?<img src={f.data} style={{maxWidth:"100%",maxHeight:80,borderRadius:4}}/>:<a href={f.data} download={f.name} style={{fontSize:10,color:"var(--accent)"}}>{f.name}</a>}</div>))}
      <input ref={fR} type="file" style={{display:"none"}} onChange={e=>{if(e.target.files[0])onFile(e.target.files[0]);}}/><Bt v="s" onClick={()=>fR.current?.click()} style={{fontSize:9}}>📎 Subir</Bt>
    </div>)}
    {t.state==="en_aprobacion"&&(<div style={{background:"var(--bg3)",borderRadius:8,padding:8}}>
      <div style={{fontSize:10,fontWeight:700,marginBottom:4}}>Votación Equipo</div>
      {teamUsers.map(u=>{const v=t.votes?.[u.id];return(<div key={u.id} style={{display:"flex",alignItems:"center",gap:4,marginBottom:3}}><Av u={u} sz={16}/><span style={{fontSize:9,flex:1}}>{u.name}</span>
        {v===undefined?((u.id===cu.id||cu.role==="admin")?<div style={{display:"flex",gap:2}}><Bt v="s" onClick={()=>onVote(u.id,true)} style={{padding:"2px 6px",fontSize:8,background:"var(--success)",color:"#fff"}}>✓</Bt><Bt v="s" onClick={()=>onVote(u.id,false)} style={{padding:"2px 6px",fontSize:8,background:"var(--danger)",color:"#fff"}}>✗</Bt></div>:<span style={{fontSize:8,color:"var(--tx3)"}}>...</span>)
        :<Bg color={v?"var(--success)":"var(--danger)"} style={{fontSize:8}}>{v?"✓":"✗"}</Bg>}</div>);})}
    </div>)}
    {t.state==="en_aprobacion"&&(<div style={{background:"linear-gradient(135deg,rgba(240,192,64,.08),rgba(240,192,64,.02))",border:"1px solid rgba(240,192,64,.25)",borderRadius:8,padding:10}}>
      <div style={{fontSize:10,fontWeight:700,marginBottom:4,color:"var(--gold)"}}>🏢 Aprobación Cliente — {t.company}</div>
      {t.clientApproval?(<div style={{fontSize:10}}>
        <Bg color={t.clientApproval.status==="aprobado"?"var(--success)":"var(--danger)"}>{t.clientApproval.status==="aprobado"?"✅ Aprobado":"✗ Rechazado"} por {t.clientApproval.by}</Bg>
        {t.clientApproval.comment&&<div style={{marginTop:4,fontSize:9,color:"var(--tx2)",background:"var(--bg3)",padding:6,borderRadius:4}}>"{t.clientApproval.comment}"</div>}
      </div>):(<div style={{fontSize:9,color:"var(--tx2)"}}>⏳ Esperando aprobación del cliente</div>)}
    </div>)}
    <div><div style={{fontSize:9,color:"var(--tx2)",fontWeight:600,marginBottom:3}}>COMENTARIOS ({t.comments?.length||0})</div>
      {(t.comments||[]).map((c,i)=><div key={i} style={{background:"var(--bg3)",padding:"4px 6px",borderRadius:4,marginBottom:2,fontSize:9}}><b style={{color:"var(--accent)"}}>{c.user}:</b> {c.text}</div>)}
      <div style={{display:"flex",gap:3,marginTop:3}}><input value={com} onChange={e=>sC(e.target.value)} placeholder="..." style={{flex:1,fontSize:9,padding:"4px 6px"}} onKeyDown={e=>{if(e.key==="Enter"&&com.trim()){onUp({comments:[...(t.comments||[]),{user:cu.name,text:com.trim()}]});sC("");}}}/>
        <Bt v="s" onClick={()=>{if(com.trim()){onUp({comments:[...(t.comments||[]),{user:cu.name,text:com.trim()}]});sC("");}}} style={{fontSize:9,padding:"3px 6px"}}>→</Bt></div>
    </div>
    <button onClick={onSave} style={{width:"100%",padding:"10px",marginTop:8,background:"var(--accent)",color:"#fff",border:"none",borderRadius:8,fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>💾 Guardar cambios</button>
  </div>);
}

// ═══ CLIENT PORTAL ══════════════════════════════════════════════
function ClientView({user:cu,onLogout:ol}){
  const[tasks,sT]=useState([]);const[cos,sCos]=useState([]);const[loaded,sLoaded]=useState(false);
  const[cM,sCM]=useState(new Date().getMonth());const[cY,sCY]=useState(new Date().getFullYear());
  const[selTask,sSelTask]=useState(null);const[comment,sComment]=useState("");const[wkOff,sWkOff]=useState(0);
  const[planners,sPlanners]=useState([]);const[tab,sTab]=useState("plan");const[draftSaved,sDraftSaved]=useState(false);
  const co=cos.find(c=>c.name.toLowerCase()===cu.companyName?.toLowerCase());
  const myTasks=tasks.filter(t=>co&&String(t.companyId)===String(co.id));
  const approval=myTasks.filter(t=>t.state==="en_aprobacion");
  const scheduled=myTasks.filter(t=>t.date);
  const teamEmails=["contifellenberg@gmail.com","clementeignacio19@gmail.com","gcastilloaguirre@gmail.com","j.agutoledo@gmail.com","jose.vergara.diaz.vr@gmail.com","inmersiatours@gmail.com"];

  useEffect(()=>{DB.loadAll().then(d=>{if(d.companies)sCos(d.companies);if(d.tasks)sT(d.tasks);if(d.planners)sPlanners(d.planners);sLoaded(true);});},[]);

  const dIM=(y,m)=>new Date(y,m+1,0).getDate();
  const fDay=(y,m)=>{const d=new Date(y,m,1).getDay();return d===0?6:d-1;};
  const calC=useMemo(()=>{const f=fDay(cY,cM),d=dIM(cY,cM),c=[];for(let i=0;i<f;i++)c.push(null);for(let i=1;i<=d;i++)c.push(i);return c;},[cM,cY]);
  const dTk=day=>{if(!day)return[];const ds=cY+"-"+String(cM+1).padStart(2,"0")+"-"+String(day).padStart(2,"0");return scheduled.filter(t=>t.date===ds);};

  // Planner week
  const pWkDays=useMemo(()=>{
    const now=new Date();now.setDate(now.getDate()+wkOff*7);const dow=now.getDay();const mon=dow===0?6:dow-1;
    const start=new Date(now);start.setDate(start.getDate()-mon);const today=new Date();const days=[];
    for(let i=0;i<7;i++){const d=new Date(start);d.setDate(start.getDate()+i);days.push({date:d,ds:d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"),day:d.getDate(),month:MO[d.getMonth()],dayName:["Lunes","Martes","Miércoles","Jueves","Viernes","Sábado","Domingo"][i],dayShort:["LUN","MAR","MIÉ","JUE","VIE","SÁB","DOM"][i],isToday:d.toDateString()===today.toDateString()});}
    return days;
  },[wkOff]);

  const pWeekKey=co?(pWkDays[0]?.ds+"_"+String(co.id)):null;
  const origPlan=planners.find(p=>p.weekKey===pWeekKey);
  const origItems=origPlan?.items||[];

  // Client draft edits
  const[draftItems,sDraftItems]=useState(null);
  useEffect(()=>{sDraftItems(null);sDraftSaved(false);},[pWeekKey]);
  const editItems=draftItems||origItems;
  const hasChanges=draftItems!==null;

  const pDayItems=day=>editItems.filter(it=>it.day===day).sort((a,b)=>(a.order||0)-(b.order||0));
  const pUpdateItem=(id,u)=>{sDraftItems((draftItems||[...origItems]).map(it=>it.id===id?{...it,...u}:it));sDraftSaved(false);};
  const isModified=(itemId,field)=>{if(!draftItems)return false;const orig=origItems.find(it=>it.id===itemId);const draft=draftItems.find(it=>it.id===itemId);if(!orig||!draft)return false;return orig[field]!==draft[field];};

  // Warn before leaving with unsaved changes
  useEffect(()=>{
    const handler=e=>{if(hasChanges&&!draftSaved){e.preventDefault();e.returnValue="";}};
    window.addEventListener("beforeunload",handler);
    return()=>window.removeEventListener("beforeunload",handler);
  },[hasChanges,draftSaved]);

  const handleLogout=()=>{
    if(hasChanges&&!draftSaved){if(!confirm("Tienes cambios sin enviar. ¿Seguro que quieres salir?"))return;}
    ol();
  };

  // Submit draft
  const submitDraft=async()=>{if(!draftItems||!pWeekKey)return;
    try{
      const fresh=await DB.loadAll();const existingDrafts=fresh.planner_drafts||[];
      const draft={id:Date.now(),weekKey:pWeekKey,companyId:co?.id,companyName:cu.companyName,clientName:cu.name,date:new Date().toISOString(),
        original:origItems,proposed:draftItems,status:"pending"};
      const newDrafts=[...existingDrafts.filter(d=>d.weekKey!==pWeekKey||d.status!=="pending"),draft];
      await DB.save("planner_drafts",newDrafts);
      API.notify({type:"task_status",to:teamEmails,taskTitle:"Cambios en planificación semanal",company:cu.companyName,state:"📝 "+cu.companyName+" propuso cambios en Org Semanal",date:pWkDays[0]?.ds});
      sDraftSaved(true);
    }catch(e){console.error("Draft save error:",e);}
  };

  // Safe task operations
  const safeSaveTask=async(taskId,updates)=>{
    try{const fresh=await DB.loadAll();const freshTasks=fresh.tasks||[];const updated=freshTasks.map(t=>t.id===taskId?{...t,...updates}:t);await DB.save("tasks",updated);sT(updated);return updated;}catch(e){console.error("Safe save error:",e);return null;}
  };
  const approve=async(taskId)=>{const task=tasks.find(t=>t.id===taskId);
    await safeSaveTask(taskId,{state:"aprobado",clientApproval:{by:cu.name,date:new Date().toISOString(),status:"aprobado"}});
    API.notify({type:"task_status",to:teamEmails,taskTitle:task?.title,company:cu.companyName,state:"✅ APROBADO por "+cu.companyName,date:task?.date});sSelTask(null);};
  const reject=async(taskId)=>{if(!comment.trim())return;const task=tasks.find(t=>t.id===taskId);
    await safeSaveTask(taskId,{state:"en_proceso",clientApproval:{by:cu.name,date:new Date().toISOString(),status:"rechazado",comment:comment.trim()},comments:[...(task?.comments||[]),{user:"🏢 "+cu.name,text:comment.trim()}]});
    API.notify({type:"task_status",to:teamEmails,taskTitle:task?.title,company:cu.companyName,state:"❌ RECHAZADO por "+cu.companyName+": "+comment.trim(),date:task?.date});sComment("");sSelTask(null);};
  const addComment=async(taskId)=>{if(!comment.trim())return;const task=tasks.find(t=>t.id===taskId);
    await safeSaveTask(taskId,{comments:[...(task?.comments||[]),{user:"🏢 "+cu.name,text:comment.trim()}]});sComment("");};

  if(!loaded)return(<div style={{height:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"var(--bg)",flexDirection:"column",gap:12}}><div style={{fontSize:24,fontWeight:900,background:"linear-gradient(135deg,var(--accent),var(--gold))",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>INMERSIA</div><div style={{color:"var(--tx2)",fontSize:12}}>Cargando...</div></div>);

  return(
    <div style={{minHeight:"100vh",background:"var(--bg)",color:"var(--tx)"}}>
      {/* HEADER */}
      <header style={{position:"sticky",top:0,zIndex:100,display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 20px",borderBottom:"1px solid var(--border)",background:"var(--bg2)"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{fontSize:14,fontWeight:900,background:"linear-gradient(135deg,var(--accent),var(--gold))",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>INMERSIA</div>
          <div style={{height:16,width:1,background:"var(--border)"}}/>
          <Av u={cu} sz={28}/>
          <div><div style={{fontSize:13,fontWeight:700}}>{cu.companyName}</div><div style={{fontSize:9,color:"var(--tx2)"}}>Portal Cliente</div></div>
        </div>
        <button onClick={handleLogout} style={{background:"var(--bg4)",color:"var(--tx2)",padding:"6px 14px",borderRadius:8,fontSize:11,border:"none",cursor:"pointer",fontFamily:"inherit"}}>Cerrar sesión</button>
      </header>

      {/* STICKY SAVE BAR */}
      {hasChanges&&!draftSaved&&(<div style={{position:"sticky",top:52,zIndex:99,padding:"8px 20px",background:"rgba(240,192,64,.12)",borderBottom:"1px solid rgba(240,192,64,.3)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span style={{fontSize:12,color:"var(--gold)",fontWeight:600}}>⚠️ Tienes cambios sin enviar</span>
        <button onClick={submitDraft} style={{padding:"8px 20px",background:"linear-gradient(135deg,var(--gold),#e6a800)",color:"#000",border:"none",borderRadius:8,fontSize:12,fontWeight:800,cursor:"pointer",fontFamily:"inherit"}}>📤 Enviar cambios al equipo</button>
      </div>)}
      {draftSaved&&(<div style={{position:"sticky",top:52,zIndex:99,padding:"8px 20px",background:"rgba(78,205,196,.1)",borderBottom:"1px solid rgba(78,205,196,.3)",textAlign:"center"}}>
        <span style={{fontSize:12,color:"var(--success)",fontWeight:600}}>✅ Cambios enviados al equipo para revisión</span>
      </div>)}

      <div style={{maxWidth:900,margin:"0 auto",padding:16}}>

        {/* TABS - only plan and calendar */}
        <div style={{display:"flex",gap:4,marginBottom:16,borderBottom:"1px solid var(--border)",paddingBottom:8}}>
          {[["plan","📋 Planificación"],["calendar","📅 Calendario"]].map(([k,l])=>(<button key={k} onClick={()=>sTab(k)} style={{padding:"8px 16px",borderRadius:"8px 8px 0 0",fontSize:12,fontWeight:tab===k?700:400,background:tab===k?"rgba(168,226,107,.1)":"transparent",color:tab===k?"var(--accent)":"var(--tx2)",border:tab===k?"1px solid var(--accent2)":"1px solid transparent",borderBottom:"none",cursor:"pointer",fontFamily:"inherit"}}>{l}</button>))}
        </div>

        {/* APPROVAL SECTION - always visible */}
        {approval.length>0&&(<div style={{marginBottom:20}}>
          <h2 style={{fontSize:15,fontWeight:700,marginBottom:10,color:"var(--gold)"}}>⏳ Pendientes de tu aprobación ({approval.length})</h2>
          {approval.map(t=>(<div key={t.id} className="cd" style={{marginBottom:8,borderLeft:"3px solid var(--gold)"}}>
            <div style={{padding:14}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <div>
                  <div style={{fontSize:13,fontWeight:700}}>{TT[t.type]?.i||"⭐"} {t.title}</div>
                  <div style={{fontSize:10,color:"var(--tx2)"}}>Fecha: {t.date||"Sin fecha"} · Estado: {SS[t.state]?.l}</div>
                </div>
              </div>
              {t.description&&<div style={{fontSize:11,color:"var(--tx2)",marginBottom:8,background:"var(--bg3)",padding:8,borderRadius:6}}>{t.description}</div>}
              {t.files?.length>0&&<div style={{marginBottom:8,background:"var(--bg3)",borderRadius:6,padding:8}}>
                <div style={{fontSize:10,fontWeight:600,marginBottom:4}}>📎 Contenido adjunto ({t.files.length})</div>
                {t.files.map((f,i)=>(<div key={i} style={{marginBottom:4}}>{f.type?.startsWith("image")?<img src={f.data} style={{maxWidth:"100%",maxHeight:200,borderRadius:6}}/>:f.type?.startsWith("video")?<video src={f.data} controls style={{maxWidth:"100%",maxHeight:200,borderRadius:6}}/>:<a href={f.data} download={f.name} style={{fontSize:11,color:"var(--accent)",display:"block",padding:4}}>{f.name}</a>}</div>))}
              </div>}
              {(t.comments||[]).length>0&&<div style={{marginBottom:8}}>{t.comments.map((c,i)=><div key={i} style={{fontSize:10,padding:"3px 6px",marginBottom:2,background:"var(--bg3)",borderRadius:4}}><b style={{color:"var(--accent)"}}>{c.user}:</b> {c.text}</div>)}</div>}
              <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
                <input value={selTask===t.id?comment:""} onFocus={()=>sSelTask(t.id)} onChange={e=>sComment(e.target.value)} placeholder="Comentario (requerido para rechazar)..." style={{flex:1,fontSize:11,padding:"7px 10px",minWidth:150}}/>
                <Bt v="p" onClick={()=>approve(t.id)} style={{padding:"7px 16px",fontSize:11}}>✅ Aprobar</Bt>
                <Bt v="d" onClick={()=>{sSelTask(t.id);reject(t.id);}} style={{padding:"7px 16px",fontSize:11}}>✗ Rechazar</Bt>
              </div>
            </div>
          </div>))}
        </div>)}

        {/* PLANNER TAB */}
        {tab==="plan"&&(<div style={{marginBottom:20}}>
          <div style={{background:"linear-gradient(135deg,var(--bg2),var(--bg3))",border:"1px solid var(--border)",borderRadius:12,padding:"14px 18px",marginBottom:14}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
              <div>
                <div style={{fontSize:18,fontWeight:900,color:co?.color}}>{co?.name?.toUpperCase()}</div>
                <div style={{fontSize:10,color:"var(--tx2)"}}>Planificación semanal · INMERSIA SPA</div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <Bt v="g" onClick={()=>sWkOff(w=>w-1)}>&lt;</Bt>
                <span style={{fontSize:12,fontWeight:700,fontFamily:"var(--font-mono)"}}>Sem. {pWkDays[0]?.day}–{pWkDays[6]?.day} {pWkDays[0]?.month}</span>
                {wkOff!==0&&<Bt v="s" onClick={()=>sWkOff(0)} style={{fontSize:9,padding:"3px 8px"}}>Hoy</Bt>}
                <Bt v="g" onClick={()=>sWkOff(w=>w+1)}>&gt;</Bt>
              </div>
            </div>
          </div>

          {origItems.length===0?(<div style={{textAlign:"center",padding:40,color:"var(--tx3)"}}><div style={{fontSize:30,marginBottom:8}}>📋</div>No hay planificación para esta semana</div>):(
          pWkDays.map(wd=>{const di=pDayItems(wd.ds);if(!di.length)return null;
            return(<div key={wd.ds} style={{marginBottom:10}}>
              <div style={{display:"flex",alignItems:"center",gap:8,padding:"6px 4px",borderBottom:"2px solid "+(co?.color||"var(--border)")}}>
                <div style={{width:44,textAlign:"center"}}>
                  <div style={{fontSize:9,fontWeight:700,color:"var(--tx2)",letterSpacing:1}}>{wd.dayShort}</div>
                  <div style={{fontSize:20,fontWeight:900,color:wd.isToday?"var(--accent)":"var(--tx)",fontFamily:"var(--font-mono)"}}>{wd.day}</div>
                </div>
                <div style={{fontSize:12,fontWeight:700}}>{wd.dayName}</div>
              </div>
              {di.map(it=>(<div key={it.id} style={{margin:"6px 0",background:"var(--bg2)",border:"1px solid var(--border)",borderLeft:"4px solid "+(TT[it.type]?.c||"#999"),borderRadius:8,padding:12}}>
                <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:6}}>
                  <Bg color={TT[it.type]?.c}>{TT[it.type]?.i} {TT[it.type]?.l}</Bg>
                  <span style={{fontSize:12,fontWeight:700}}>{it.title}</span>
                </div>
                <div style={{fontSize:10,color:"var(--tx3)",marginBottom:4}}>DESCRIPCIÓN</div>
                <AutoTx value={it.description} onChange={e=>pUpdateItem(it.id,{description:e.target.value})} placeholder="Descripción..." style={{fontSize:12,padding:"8px",width:"100%",boxSizing:"border-box",lineHeight:1.6,background:isModified(it.id,"description")?"rgba(255,68,68,.06)":"var(--bg3)",borderColor:isModified(it.id,"description")?"rgba(255,68,68,.4)":"var(--border)"}}/>
                {it.strategy&&<>
                  <div style={{fontSize:10,color:"var(--gold)",marginTop:8,marginBottom:4}}>ESTRATEGIA</div>
                  <AutoTx value={it.strategy} onChange={e=>pUpdateItem(it.id,{strategy:e.target.value})} placeholder="Estrategia..." style={{fontSize:12,padding:"8px",width:"100%",boxSizing:"border-box",lineHeight:1.6,background:isModified(it.id,"strategy")?"rgba(255,68,68,.06)":"var(--bg3)",borderColor:isModified(it.id,"strategy")?"rgba(255,68,68,.4)":"var(--border)"}}/>
                </>}
              </div>))}
            </div>);
          }))}

          {hasChanges&&!draftSaved&&<button onClick={submitDraft} style={{width:"100%",padding:"14px",marginTop:12,background:"linear-gradient(135deg,var(--gold),#e6a800)",color:"#000",border:"none",borderRadius:10,fontSize:14,fontWeight:800,cursor:"pointer",fontFamily:"inherit"}}>📤 Enviar cambios al equipo para revisión</button>}
        </div>)}

        {/* CALENDAR TAB */}
        {tab==="calendar"&&(<div style={{marginBottom:20}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <h2 style={{fontSize:15,fontWeight:700,margin:0}}>📅 Calendario</h2>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <Bt v="g" onClick={()=>{if(cM===0){sCM(11);sCY(cY-1)}else sCM(cM-1)}}>&lt;</Bt>
              <span style={{fontSize:13,fontWeight:700,minWidth:130,textAlign:"center",fontFamily:"var(--font-mono)"}}>{MO[cM]} {cY}</span>
              <Bt v="g" onClick={()=>{if(cM===11){sCM(0);sCY(cY+1)}else sCM(cM+1)}}>&gt;</Bt>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:1,background:"var(--border)",borderRadius:8,overflow:"hidden"}}>
            {WD.map(d=><div key={d} style={{background:"var(--bg3)",padding:"6px 0",textAlign:"center",fontSize:10,fontWeight:700,color:"var(--tx2)"}}>{d}</div>)}
            {calC.map((day,i)=>{const dt2=dTk(day);const isT=day&&new Date().getDate()===day&&new Date().getMonth()===cM&&new Date().getFullYear()===cY;
              return(<div key={i} style={{background:isT?"rgba(168,226,107,.08)":"var(--bg2)",minHeight:80,maxHeight:110,overflow:"hidden",padding:4,opacity:day?1:.3}}>
                {day&&(<><div style={{fontSize:11,fontWeight:isT?800:500,color:isT?"var(--accent)":"var(--tx2)",padding:"2px 4px",borderRadius:4,display:"inline-block",background:isT?"rgba(168,226,107,.15)":"transparent"}}>{day}</div>
                  {dt2.map(t=>(<div key={t.id} style={{padding:"3px 6px",marginBottom:2,borderRadius:5,fontSize:9,background:(TT[t.type]?.c||"#999")+"15",color:TT[t.type]?.c,fontWeight:600,overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis",borderLeft:"3px solid "+(TT[t.type]?.c||"#999")}}>{TT[t.type]?.i||"⭐"} {t.title}</div>))}
                </>)}</div>);})}
          </div>
        </div>)}

      </div>
    </div>
  );
}

function App(){
  const [u,sU]=useState(null);
  const [us,sUs]=useState(INIT_USERS);

  // 🔥 LOGIN GOOGLE
useEffect(() => {
  const params = new URLSearchParams(window.location.search);

  const email = params.get("email");
  const login = params.get("login");
  const gcal = params.get("gcal");

  // 🔐 LOGIN
  if (login === "success" && email) {
    localStorage.setItem("userEmail", email);
    const found = us.find(x => x.email === email || x.gmail === email);
    sU(found || { id:99, name: email.split("@")[0], email, role: "admin", avatar: email.slice(0,2).toUpperCase(), color: "#9d6bff" });
    window.history.replaceState({}, document.title, "/");
  }

  // 📅 GCAL
  if (gcal === "success") {
    const gcalToken = params.get("gcal_token");
    if (gcalToken) {
      const saved2 = JSON.parse(localStorage.getItem("inm_gcal_tokens") || "{}");
      const userEmail2 = localStorage.getItem("userEmail");
      if (userEmail2) { saved2[userEmail2] = gcalToken; }
      else { saved2["default"] = gcalToken; }
      localStorage.setItem("inm_gcal_tokens", JSON.stringify(saved2));
    }
    alert("Google Calendar conectado ✅");
    window.history.replaceState({}, document.title, "/");
  }

  // 🔄 mantener sesión
  const saved = localStorage.getItem("userEmail");
  if (saved && !u) {
    const sl=saved.toLowerCase();
    const found = us.find(x => x.email.toLowerCase()===sl || x.name.toLowerCase()===sl || (x.gmail&&x.gmail.toLowerCase()===sl));
    sU(found || { id:99, name: saved.split("@")[0], email: saved, role: "admin", avatar: saved.slice(0,2).toUpperCase(), color: "#9d6bff" });
  }

}, []);

  if(!u) return <Login users={us} onLogin={x=>{localStorage.setItem("userEmail",x.email);sU(x);}}/>;
  if(u.role==="cliente") return <ClientView user={u} onLogout={()=>{localStorage.removeItem("userEmail");sU(null);}}/>;
  return <Main user={u} users={us} onLogout={()=>{localStorage.removeItem("userEmail");sU(null);}} setUsers={sUs}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
